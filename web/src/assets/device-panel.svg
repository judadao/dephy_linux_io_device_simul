  <rect x="386" y="82" width="488" height="196" rx="12" fill="#111a24" stroke="#263241"/>
  <text x="112" y="122" fill="#d7dee8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">DEPHY IO SIM</text>
  <text x="112" y="154" fill="#93a4b8" font-family="Inter, Arial, sans-serif" font-size="16">Linux local device</text>
  <circle cx="122" cy="220" r="14" fill="#14b8a6"/>
